<!DOCTYPE html>
<html>
<head>
    <title>Nature's Beauty Salon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin:0; font-family:Arial; background:#fff; }

        header {
            background: linear-gradient(black, #333);
            color: gold;
            text-align: center;
            padding: 40px 20px;
        }

        .btn {
            background: gold;
            padding: 10px 20px;
            border: none;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        .section { padding:30px 20px; text-align:center; }

        .services {
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
            gap:15px;
            margin-top:20px;
        }

        .card {
            background:#f9f9f9;
            padding:15px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .price { color:green; font-weight:bold; }

        footer {
            background:black;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>
</head>

<body>

<!-- 🔥 Offer Banner -->
<div style="background:red;color:white;text-align:center;padding:12px;font-weight:bold;">
🔥 Get 20% OFF on All Services! Limited Time Offer 🔥 <br><br>
<button onclick="whatsapp()" style="background:white;color:red;padding:10px 20px;border:none;border-radius:5px;">
Book Now & Save
</button>
</div>

<header>
    <h1>Nature's Beauty Salon</h1>
    <p>Enhancing Your Natural Beauty</p>
    <button class="btn" onclick="callNow()">Book Appointment</button>
</header>

<div class="section">
    <h2>Our Services</h2>

    <div class="services">
        <div class="card">
            <h3>Threading</h3>
            <p class="price">₹25</p>
        </div>

        <div class="card">
            <h3>Forehead + Upper Lip</h3>
            <p class="price">₹10</p>
        </div>

        <div class="card">
            <h3>Haircut</h3>
            <p class="price">₹299</p>
        </div>

        <div class="card">
            <h3>Cleanup</h3>
            <p class="price">₹259</p>
        </div>

        <div class="card">
            <h3>Facial (Fruit)</h3>
            <p class="price">₹699</p>
        </div>

        <div class="card">
            <h3>Facial (Gold)</h3>
            <p class="price">₹1199</p>
        </div>
    </div>
</div>

<div class="section">
    <h2>Contact Us</h2>
    <p>📞 9648469543</p>
    <button class="btn" onclick="whatsapp()">Book on WhatsApp</button>
</div>

<footer>
    <p>© 2026 Nature's Beauty Salon</p>
</footer>

<script>
function callNow() {
    window.location.href = "tel:9648469543";
}

function whatsapp() {
    window.open("https://wa.me/919648469543?text=Hello%20I%20want%20to%20book%20an%20appointment%20at%20Nature's%20Beauty%20Salon");
}
</script>

</body>
</html>
